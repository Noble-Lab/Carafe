name: Build Windows Installer

# Builds the unsigned Carafe Windows MSI with OspreySharp bundled inside, the same
# way Bo's local installer does, but fully automated:
#   mvn package  ->  publish OspreySharp (self-contained)  ->  jpackage MSI.
#
# OspreySharp lives in the ProteoWizard tree and is a self-contained managed .NET
# solution (no native pwiz C++ build needed), so a runner only needs the .NET 8
# SDK. We sparse-checkout just the OspreySharp subtree at a pinned ref.
#
# Triggers: manual (workflow_dispatch) and version tags (v*). MSI builds are heavy,
# so it does NOT run on every push.

on:
  workflow_dispatch:
    inputs:
      ospreysharp_repo:
        description: "Git repo containing pwiz_tools/OspreySharp (owner/name)"
        required: true
        # OspreySharp is public in ProteoWizard/pwiz; override only to test a fork.
        default: "ProteoWizard/pwiz"
      ospreysharp_ref:
        description: "Branch, tag, or commit SHA of the OspreySharp source to build"
        required: true
        default: "master"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-msi:
    runs-on: windows-latest

    env:
      # Defaults used when the workflow is triggered by a tag (no manual inputs).
      OSPREYSHARP_REPO: ${{ github.event.inputs.ospreysharp_repo || 'ProteoWizard/pwiz' }}
      OSPREYSHARP_REF: ${{ github.event.inputs.ospreysharp_ref || 'master' }}
      RID: win-x64

    steps:
      - name: Checkout Carafe
        uses: actions/checkout@v4

      # JDK with jpackage. Match the runtime version Bo ships (README requires
      # 25.0.2+); the bundled JEP 472 native-access flag needs JDK 24+.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # jpackage's MSI backend is WiX 3.x (candle/light). windows-latest already
      # ships WiX 3.14, so just locate it and put its bin on PATH; install only as
      # a fallback if it is ever missing (do NOT pin a version - choco fails when a
      # newer build is already installed).
      - name: Ensure WiX 3 on PATH (jpackage MSI backend)
        shell: pwsh
        run: |
          $light = Get-ChildItem 'C:\Program Files (x86)\WiX Toolset*\bin\light.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $light) {
            choco install wixtoolset --no-progress -y
            $light = Get-ChildItem 'C:\Program Files (x86)\WiX Toolset*\bin\light.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $light) { Write-Error 'WiX 3 (light.exe) not found'; exit 1 }
          Add-Content -Path $env:GITHUB_PATH -Value $light.Directory.FullName
          Write-Host "Using WiX at $($light.Directory.FullName)"

      # STOP-GAP: com.compomics:utilities:5.0.39P2 is a patched build that is not
      # published to any public Maven repo, so a clean checkout cannot resolve it.
      # Install the vendored copy into the runner's local repo before building.
      # TODO(Bo): replace by publishing this jar to a lab-controlled Maven repo and
      # resolving it normally, then drop lib/ and this step.
      # Use cmd (not the default pwsh): PowerShell mangles unquoted -D values that
      # contain '.'/'/' (e.g. -Dfile=lib/utilities-5.0.39P2.jar -> lib/utilities-5).
      - name: Install patched compomics-utilities into the local Maven repo
        shell: cmd
        run: mvn -B install:install-file -Dfile=lib/utilities-5.0.39P2.jar -DgroupId=com.compomics -DartifactId=utilities -Dversion=5.0.39P2 -Dpackaging=jar

      - name: Build Carafe jar
        run: mvn -B -DskipTests package

      # OspreySharp is public (ProteoWizard/pwiz). Sparse-checkout only what the
      # build touches: the OspreySharp subtree, the shared PortableUtil project,
      # and two vendored DLLs the projects bind to outside that subtree:
      #   * Shared/Lib/DotNetZip  - hard <Reference> in OspreySharp.IO (build fails without it)
      #   * Shared/Lib/Parquet    - patched ParquetNet.dll that OspreySharp's
      #                             Directory.Build.targets overlays post-build; the
      #                             overlay is Exists()-guarded, so a missing file would
      #                             SILENTLY ship a build that can't read osprey parquet.
      - name: Checkout OspreySharp source (sparse)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OSPREYSHARP_REPO }}
          ref: ${{ env.OSPREYSHARP_REF }}
          path: pwiz
          sparse-checkout: |
            pwiz_tools/OspreySharp
            pwiz_tools/Shared/PortableUtil
            pwiz_tools/Shared/Lib/DotNetZip
            pwiz_tools/Shared/Lib/Parquet
          sparse-checkout-cone-mode: false

      # Publish a self-contained, single-file OspreySharp straight into the app
      # directory so jpackage's --input sweeps it into the MSI. resolveOspreyBinary()
      # then finds it at <appdir>/osprey/win-x64/OspreySharp.exe next to the jar.
      - name: Publish OspreySharp (self-contained ${{ env.RID }})
        run: >
          dotnet publish
          pwiz/pwiz_tools/OspreySharp/OspreySharp/OspreySharp.csproj
          -c Release -f net8.0 -r ${{ env.RID }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Platform=x64
          -o target/carafe-2.2.0/osprey/${{ env.RID }}

      - name: Build MSI (unsigned, OspreySharp bundled)
        run: scripts\generate_installer_win.bat

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Carafe-${{ env.RID }}-msi
          path: target/installer/*.msi
          if-no-files-found: error

      # On a version tag, attach the MSI to the GitHub Release.
      - name: Attach MSI to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/installer/*.msi
